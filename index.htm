<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BRIMO CHICKEN</title>
  <meta
    name="description"
    content="BRIMO CHICKEN, commandez vos burgers, tacos, wraps, menus familiaux et poulet frit a Casablanca."
  />
  <meta name="theme-color" content="#e97622" />
  <link
    rel="icon"
    href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="18" fill="%23e97622"/><text x="50%25" y="54%25" dominant-baseline="middle" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="white">B</text></svg>'
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&amp;family=Stack+Sans+Headline:wght@200..700&amp;family=Tajawal:wght@400;500;700&amp;display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --accent: #e97622;
      --accent-dark: #c45f15;
      --accent-soft: #fff1e5;
      --accent-strong: #8d3f09;
      --text: #2d2d2d;
      --text-muted: #6b6b6b;
      --bg-page: #fff9f4;
      --bg-shell: linear-gradient(180deg, #fff7ef 0%, #fffdf9 34%, #fff4e8 100%);
      --white: #fff;
      --line: rgba(141, 63, 9, 0.12);
      --shadow: 0 14px 38px rgba(71, 39, 14, 0.08);
      --radius-card: 18px;
      --radius-cat: 22px;
    }

    .stack-sans-headline-uniquifier {
      font-family: "Stack Sans Headline", sans-serif;
      font-optical-sizing: auto;
      font-weight: 400;
      font-style: normal;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", system-ui, -apple-system, sans-serif;
      background: var(--bg-shell);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .page-shell {
      width: min(1240px, calc(100% - 32px));
      margin: 0 auto;
    }

    /* ——— Header (shared) ——— */
    .site-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      width: min(1240px, calc(100% - 32px));
      min-height: 104px;
      margin: 16px auto 0;
      position: sticky;
      top: 12px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(14px);
      z-index: 100;
      box-shadow: 0 18px 40px rgba(88, 54, 17, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 30px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-right: 0;
      border-right: none;
      margin-right: 0;
      min-width: 0;
      flex: 1 1 auto;
    }

    .brand > div {
      min-width: 0;
    }

    .brand__mark {
      width: 72px;
      height: 72px;
      border-radius: 22px;
      background: linear-gradient(145deg, var(--accent) 0%, var(--accent-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      line-height: 1.15;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .brand__name {
      font-weight: 700;
      font-size: 1.45rem;
      letter-spacing: 0.08em;
      color: var(--text);
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .brand__tagline {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .header-cta {
      justify-self: end;
      text-align: right;
      min-width: 0;
    }

    .header-cta__row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      min-width: 0;
    }

    .header-cta__row > div {
      min-width: 0;
    }

    .header-cta__icon {
      width: 40px;
      height: 40px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .header-cta__title {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
    }

    .header-cta__phone {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      margin-top: 2px;
      overflow-wrap: anywhere;
    }

    .header-cta__phone a {
      color: inherit;
      text-decoration: none;
    }

    .header-cta__phone a:hover {
      text-decoration: underline;
    }

    .header-controls {
      display: flex;
      align-items: center;
      justify-self: center;
      gap: 6px;
      text-align: center;
    }

    .lang-switcher__icon {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f5ede6;
      color: var(--accent);
      flex-shrink: 0;
    }

    .lang-switcher {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px;
      background: #f5ede6;
      border-radius: 999px;
    }

    .lang-switcher__btn {
      border: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .lang-switcher__btn.is-active {
      background: var(--accent);
      color: var(--white);
    }

    .btn-back {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 10px;
      background: rgba(233, 118, 34, 0.15);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 4px;
      transition: background 0.2s;
    }

    .btn-back:hover {
      background: rgba(233, 118, 34, 0.28);
    }

    .header-with-back {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ——— Categories view ——— */
    #view-categories .site-header {
      margin-bottom: 18px;
    }

    .hero {
      background:
        radial-gradient(circle at top left, rgba(233, 118, 34, 0.18), transparent 34%),
        linear-gradient(135deg, #fff8f1 0%, #fff1e3 100%);
      border: 1px solid rgba(233, 118, 34, 0.16);
      border-radius: 34px;
      padding: 34px;
      box-shadow: var(--shadow);
      margin-bottom: 26px;
    }

    .hero__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(233, 118, 34, 0.12);
      color: var(--accent-strong);
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .hero__title {
      margin-top: 18px;
      font-size: clamp(2rem, 4vw, 3.4rem);
      line-height: 0.98;
      font-weight: 800;
      max-width: 10ch;
    }

    .hero__lead {
      margin-top: 14px;
      max-width: 720px;
      font-size: 1rem;
      line-height: 1.75;
      color: var(--text-muted);
    }

    .hero__stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 24px;
    }

    .hero__stat {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(233, 118, 34, 0.14);
      border-radius: 20px;
      padding: 16px 18px;
    }

    .hero__stat strong {
      display: block;
      font-size: 1.05rem;
      color: var(--accent-strong);
      margin-bottom: 4px;
    }

    .hero__stat span {
      font-size: 0.84rem;
      line-height: 1.5;
      color: var(--text-muted);
    }

    .categories-title {
      text-align: left;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      padding: 0 6px;
      margin-bottom: 20px;
    }

    .cat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 0 0 100px;
      max-width: 100%;
      margin: 0;
    }

    @media (min-width: 1200px) {
      .cat-grid {
        grid-template-columns: repeat(4, 1fr);
        max-width: 1400px;
        margin: 0 auto;
        padding: 0 0 100px;
      }
    }

    .cat-card {
      aspect-ratio: 4 / 3;
      max-height: 180px;
    }

    @media (max-width: 960px) {
      .site-header {
        width: min(1240px, calc(100% - 24px));
        min-height: 92px;
        padding: 12px 16px;
        gap: 12px;
      }

      .brand__mark {
        width: 60px;
        height: 60px;
        font-size: 12px;
      }

      .brand__name {
        font-size: 1.1rem;
        letter-spacing: 0.05em;
      }

      .header-cta__icon {
        width: 34px;
        height: 34px;
      }

      .header-cta__title {
        font-size: 0.78rem;
      }

      .header-cta__phone {
        font-size: 0.86rem;
      }

      .header-cta__row {
        gap: 8px;
      }

      .categories-title {
        font-size: 1.2rem;
        margin-bottom: 20px;
      }

      .hero {
        padding: 26px 22px;
      }

      .hero__stats {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 720px) {
      .site-header {
        grid-template-columns: minmax(0, 1fr) auto;
        min-height: 78px;
        width: min(1240px, calc(100% - 18px));
        padding: 12px;
        gap: 8px;
        top: 8px;
        border-radius: 24px;
      }

      .brand {
        gap: 8px;
        min-width: 0;
      }

      .header-with-back {
        min-width: 0;
      }

      .brand__mark {
        width: 48px;
        height: 48px;
        font-size: 11px;
        flex-shrink: 0;
      }

      .brand__name {
        font-size: 0.95rem;
        letter-spacing: 0.03em;
        line-height: 1.15;
      }

      .brand__tagline {
        font-size: 0.64rem;
        letter-spacing: 0.12em;
      }

      .header-cta {
        justify-self: end;
        width: auto;
        text-align: right;
      }

      .header-cta__row {
        gap: 6px;
        justify-content: flex-end;
        align-items: center;
      }

      .header-cta__icon {
        width: 28px;
        height: 28px;
      }

      .header-cta__title {
        display: block;
        font-size: 0.7rem;
        line-height: 1.1;
      }

      .header-cta__phone {
        font-size: 0.8rem;
        margin-top: 0;
      }

      .header-cta__phone a {
        white-space: nowrap;
      }

      .btn-back {
        width: 34px;
        height: 34px;
        margin-right: 0;
      }

      .cat-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 0 0 110px;
      }

      .cat-card {
        max-height: 170px;
      }

      .cat-card__label {
        font-size: 1rem;
      }
    }

    @media (max-width: 520px) {
      .site-header {
        min-height: 72px;
        padding: 8px 10px;
        width: calc(100% - 12px);
        margin-top: 8px;
        border-radius: 20px;
      }

      .brand__mark {
        width: 42px;
        height: 42px;
        font-size: 10px;
      }

      .brand__name {
        font-size: 0.82rem;
      }

      .brand__tagline {
        font-size: 0.58rem;
        letter-spacing: 0.08em;
      }

      .header-with-back {
        gap: 6px;
        min-width: 0;
      }

      .header-cta {
        justify-self: end;
        text-align: right;
      }

      .header-cta__icon {
        display: none;
      }

      .header-cta__title {
        font-size: 0.62rem;
      }

      .header-cta__phone {
        font-size: 0.72rem;
        line-height: 1.15;
      }

      .cat-grid {
        grid-template-columns: 1fr;
        gap: 12px;
        padding: 0 12px 120px;
      }

      .cat-card {
        max-height: 150px;
      }

      .categories-title {
        font-size: 1.15rem;
      }

      .page-shell {
        width: min(1240px, calc(100% - 18px));
      }

    }

    @media (max-width: 380px) {
      .site-header {
        min-height: 64px;
        padding: 8px;
        grid-template-columns: minmax(0, 1fr) auto;
      }

      .brand {
        gap: 6px;
      }

      .brand__mark {
        width: 38px;
        height: 38px;
        font-size: 9px;
      }

      .brand__name {
        font-size: 0.74rem;
        letter-spacing: 0.02em;
      }

      .brand__tagline {
        font-size: 0.54rem;
        letter-spacing: 0.06em;
      }

      .header-cta__phone {
        font-size: 0.66rem;
      }

      .header-cta__title {
        font-size: 0.56rem;
      }

      .btn-back {
        width: 30px;
        height: 30px;
      }

      .cat-grid {
        gap: 10px;
        padding: 0 0 120px;
      }

      .cat-card {
        max-height: 130px;
      }

      .cat-card__label {
        font-size: 0.95rem;
        padding: 20px 10px;
      }
    }

    .cat-card {
      position: relative;
      aspect-ratio: 16 / 9;
      border-radius: var(--radius-cat);
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.72);
      display: block;
      width: 100%;
      padding: 0;
      background: #ddd;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .cat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
    }

    .cat-card__img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cat-card__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(28, 16, 8, 0.82), rgba(28, 16, 8, 0.18));
    }

    .cat-card__label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px;
      text-align: center;
      font-size: clamp(1rem, 2.5vw, 1.25rem);
      font-weight: 800;
      color: var(--white);
      line-height: 1.2;
      font-family: "Poppins", "Stack Sans Headline", sans-serif;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.45);
    }

    /* ——— Menu view ——— */
    #view-menu {
      display: none;
      background: var(--bg-page);
      min-height: 100vh;
      padding-bottom: 88px;
    }

    #view-menu.is-visible {
      display: block;
    }

    #view-categories.hidden {
      display: none;
    }

    .menu-header-bar {
      background: transparent;
    }

    .menu-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 0 28px;
    }

    .section-heading {
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      margin-top: 28px;
    }

    .section-heading:first-child {
      margin-top: 0;
    }

    .section-heading__emoji {
      font-size: 1.4rem;
    }

    .section-heading__title {
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
    }

    .section-heading__sub {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      width: 100%;
      margin-top: -2px;
    }

    .items-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 0;
    }

    @media (max-width: 900px) {
      .items-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 720px) {
      .cat-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
        padding: 0 14px 100px;
      }
    }

    @media (max-width: 520px) {
      .items-grid {
        grid-template-columns: 1fr;
      }
    }

    .menu-card {
      position: relative;
      background: var(--white);
      border-radius: var(--radius-card);
      padding: 18px 86px 18px 18px;
      min-height: 72px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
    }

    .menu-card--family-box {
      justify-content: flex-start;
      padding: 18px 72px 18px 16px;
      min-height: auto;
    }

    .menu-card--family-box .menu-card__desc {
      margin-bottom: 0;
      padding-top: 12px;
      padding-bottom: 12px;
    }

    .menu-card__name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
      padding-right: 4px;
      margin-bottom: 0;
      letter-spacing: 0.01em;
    }

    .menu-card__desc {
      font-size: 0.72rem;
      margin-top: 0;
      color: #515151;
      line-height: 1.55;
      margin-bottom: 0;
      background: #fff7ef;
      border-left: 4px solid rgba(233, 118, 34, 0.45);
      border-radius: 10px;
      padding: 10px 12px;
    }

    .menu-card__option {
      font-size: 0.72rem;
      color: #9a4b10;
      margin-top: 0;
      font-weight: 700;
      line-height: 1.45;
      background: rgba(233, 118, 34, 0.12);
      border: 1px dashed rgba(233, 118, 34, 0.45);
      border-radius: 999px;
      padding: 8px 12px;
      display: inline-flex;
      align-self: flex-start;
      max-width: 100%;
    }

    .menu-card__option + .menu-card__option {
      margin-top: 0;
    }

    .menu-card__preview-btn {
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      align-self: center;
      margin-left: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: transparent;
      color: #111111;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #111111;
      box-shadow: none;
      transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, opacity 0.18s ease;
    }

    .menu-card__preview-icon {
      font-size: 0.95rem;
      line-height: 1;
    }

    .menu-card__preview-btn.is-transparent {
      background: transparent;
      color: rgba(17, 17, 17, 0.72);
      border-color: rgba(17, 17, 17, 0.24);
      cursor: default;
      pointer-events: none;
    }

    .menu-card__preview-btn:hover {
      background: rgba(17, 17, 17, 0.06);
      border-color: #000000;
      color: #000000;
      opacity: 0.92;
    }

    .menu-card__preview-btn.is-transparent:hover {
      background: transparent;
      border-color: rgba(17, 17, 17, 0.24);
      color: rgba(17, 17, 17, 0.72);
      opacity: 1;
    }

    .price-pill {
      position: absolute;
      right: -6px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      color: var(--white);
      font-weight: 700;
      font-size: 0.82rem;
      padding: 10px 14px;
      border-radius: 999px;
      white-space: nowrap;
      box-shadow: 0 2px 10px rgba(233, 118, 34, 0.45);
    }

    .special-block {
      background: var(--white);
      border-radius: var(--radius-card);
      padding: 18px;
      margin-top: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
    }

    .special-block h4 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 6px;
      text-transform: lowercase;
    }

    .special-block .flavors {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .flavor-tag {
      background: rgba(128, 128, 128, 0.1);
      color: #666;
      border: 1px solid rgba(128, 128, 128, 0.2);
      border-radius: 50px;
      padding: 4px 12px;
      font-size: 0.7rem;
      font-weight: 500;
      display: inline-block;
      white-space: nowrap;
    }

    .price-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 20px;
      margin-top: 8px;
    }

    .price-pair {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .price-row span:not(.pill-inline) {
      font-size: 0.88rem;
      font-weight: 500;
    }

    .price-row .pill-inline {
      display: inline-block;
      background: var(--accent);
      color: var(--white);
      font-weight: 700;
      font-size: 0.8rem;
      padding: 8px 14px;
      border-radius: 999px;
    }

    .extra-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 10px;
    }

    .special-block__extra {
      margin-top: 14px;
    }

    .image-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(17, 17, 17, 0.82);
      z-index: 999;
    }

    .image-modal.is-open {
      display: flex;
    }

    const categoryList = [
      { id: "burgers", label: { fr: "Burgers", ar: "برغر" } },
      { id: "poulet", label: { fr: "Sandwichs Poulet", ar: "ساندويتشات الدجاج" } },
      { id: "familial", label: { fr: "menus familiaux", ar: "وجبات عائلية" } },
      { id: "bowls", label: { fr: "Bols & Macaroni au fromage", ar: "أطباق وماكاروني بالجبن" } },
      { id: "salades", label: { fr: "Salades", ar: "سلطات" } },
      { id: "jus", label: { fr: "Jus", ar: "عصائر" } },
      { id: "poutines", label: { fr: "Poutines", ar: "بوتين" } },
      { id: "tacos", label: { fr: "Tacos", ar: "تاكوس" } },
      { id: "wraps", label: { fr: "Wraps", ar: "رابس" } },
      { id: "kfc", label: { fr: "Poulet frit coréen", ar: "دجاج مقلي كوري" } },
      { id: "kentucky", label: { fr: "Kentucky Style", ar: "ستايل كنتاكي" } },
      { id: "fingers", label: { fr: "Bouchées à grignoter", ar: "لقيمات للمشاركة" } },
    ];

    function renderCategoryGrid() {
      const grid = document.getElementById("cat-grid");
      grid.innerHTML = categoryList
        .map(
          (c) => {
            const label = localized(c.label);
            return `
        <button type="button" class="cat-card" data-id="${c.id}" aria-label="${label}">
          <img class="cat-card__img" src="${categoryImages[c.id]}" alt="${label}" loading="lazy" decoding="async" />
          <div class="cat-card__overlay"></div>
          <span class="cat-card__label">${label}</span>
        </button>
      `;
          }
        )
        .join("");
      grid.querySelectorAll(".cat-card").forEach((btn) => {
        btn.addEventListener("click", () => openMenu(btn.dataset.id));
      });
    }

    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function renderPreviewButton(src, title, label = t("previewFallback")) {
      return `<button type="button" class="menu-card__preview-btn${
        arguments[3] ? " is-transparent" : ""
      }" data-preview-src="${esc(
        src
      )}" data-preview-title="${esc(title)}"><span class="menu-card__preview-icon" aria-hidden="true">📷</span><span>${esc(label)}</span></button>`;
    }

    function renderMenuCard(item) {
      const itemName = localized(item.name);
      const itemDesc = localized(item.desc);
      const itemOption = localized(item.option);
      const itemTopping = localized(item.topping);
      const itemImageLabel = localized(item.imageLabel);
      const opt = itemOption
        ? `<div class="menu-card__option">${esc(itemOption)}</div>`
        : "";
      const topping = itemTopping
        ? `<div class="menu-card__option">${esc(itemTopping)}</div>`
        : "";
      const previewBtn = item.previewSrc
        ? renderPreviewButton(
            item.previewSrc,
            item.previewTitle || itemName,
            itemImageLabel || t("previewFallback"),
            item.transparentPreviewButton
          )
        : "";
      // Allow HTML in description for special items like Family Box
      const descHtml = itemName.includes("Family Box") || itemName.includes("بوكس")
        ? itemDesc
        : esc(itemDesc);
      
      // Special layout for Family Box (no centering, more compact)
      const cardClass = itemName.includes("Family Box") || itemName.includes("بوكس")
        ? "menu-card menu-card--family-box" 
        : "menu-card";
      
      return `
        <article class="${cardClass}">
          <div class="menu-card__name">${esc(itemName)}</div>
          ${
            itemDesc
              ? `<div class="menu-card__desc">${descHtml}</div>`
              : ""
          }
          ${opt}
          ${topping}
          ${previewBtn}
          <div class="price-pill">${esc(item.price)}</div>
        </article>
      `;
    }

    const imageModal = document.getElementById("image-modal");
    const imageModalImg = document.getElementById("image-modal-img");
    const imageModalCaption = document.getElementById("image-modal-caption");
    const imageModalClose = document.getElementById("image-modal-close");

    function openImageModal(src, title) {
      imageModalImg.src = src;
      imageModalImg.alt = title;
      imageModalCaption.textContent = title;
      imageModal.classList.add("is-open");
      imageModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeImageModal() {
      imageModal.classList.remove("is-open");
      imageModal.setAttribute("aria-hidden", "true");
      imageModalImg.src = "";
      imageModalImg.alt = "";
      imageModalCaption.textContent = "";
      document.body.style.overflow = "";
    }

    function renderMenu(id) {
      const data = menuData[id];
      const inner = document.getElementById("menu-inner");
      const categoryPreview = categoryImages[id];
      let html = "";

      const dataTitle = localized(data.title);
      const dataSubtitle = localized(data.subtitle);
      const sub = dataSubtitle
        ? `<span class="section-heading__sub">${esc(dataSubtitle)}</span>`
        : "";

      html += `<div class="section-heading">
        <span class="section-heading__emoji">${data.emoji}</span>
        <span class="section-heading__title">${esc(dataTitle)}</span>
        ${sub}
      </div>`;

      if (data.items && data.items.length) {
        const itemsWithPreview = data.items.map((item) => ({
          ...item,
          previewSrc: item.imagePreview || categoryPreview,
          previewTitle: localized(item.name),
        }));
        html += `<div class="items-grid">${itemsWithPreview.map(renderMenuCard).join("")}</div>`;
      }

      if (data.footer) {
        html += `<p class="extra-note" style="margin-top:14px">${esc(
          localized(data.footer)
        )}</p>`;
      }

      if (data.special) {
        data.special.forEach((block) => {
          const blockName = localized(block.name);
          const blockFlavors = localized(block.flavors);
          const blockExtra = localized(block.extra);
          const blockImageLabel = localized(block.imageLabel);
          const flavorsArray = blockFlavors.split(' / ');
          const flavorsHtml = flavorsArray.map(flavor => 
            `<span class="flavor-tag">${esc(flavor.trim())}</span>`
          ).join('');
          
          html += `<div class="special-block">
            <h4>${esc(blockName)}</h4>
            <div class="flavors">${flavorsHtml}</div>
            <div class="price-row">
              ${block.prices
                .map(
                  (p) =>
                    `<span class="price-pair"><span>${esc(
                      localized(p.label)
                    )}</span><span class="pill-inline">${esc(
                      p.value
                    )}</span></span>`
                )
                .join("")}
            </div>
            ${
              blockExtra
                ? `<div class="menu-card__option special-block__extra">${esc(
                    blockExtra
                  )}</div>`
                : ""
            }
            ${renderPreviewButton(
              block.imagePreview || categoryPreview,
              blockName,
              blockImageLabel || t("previewFallback")
            )}
          </div>`;
        });
      }

      if (data.streetRows) {
        html += `<div class="items-grid">`;
        data.streetRows.forEach((row) => {
          const pricesHtml = row.prices
            .map(
              (p) =>
                `<span style="display:inline-flex;align-items:center;gap:8px;margin-right:12px;margin-top:6px"><span style="font-size:0.85rem">${esc(
                  localized(p.label)
                )}</span><span class="pill-inline" style="position:relative;right:auto;top:auto;transform:none">${esc(
                  p.value
                )}</span></span>`
            )
            .join("");
          html += `<article class="menu-card" style="padding:16px;grid-column:1/-1;max-width:100%">
            <div class="menu-card__name" style="margin-bottom:10px">${esc(
              localized(row.name)
            )}</div>
            <div class="price-row" style="margin-top:0">${pricesHtml}</div>
            ${renderPreviewButton(
              row.imagePreview || categoryPreview,
              localized(row.name),
              localized(row.imageLabel) || t("previewFallback")
            )}
          </article>`;
        });
        html += `</div>`;
      }

      inner.innerHTML = html;
      inner.querySelectorAll(".menu-card__preview-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          openImageModal(btn.dataset.previewSrc, btn.dataset.previewTitle);
        });
      });
    }

    function openMenu(id) {
      document.getElementById("view-categories").classList.add("hidden");
      document.getElementById("view-menu").classList.add("is-visible");
      renderMenu(id);
      window.location.hash = id;
    }

    function closeMenu() {
      document.getElementById("view-categories").classList.remove("hidden");
      document.getElementById("view-menu").classList.remove("is-visible");
      if (window.location.hash) {
        history.replaceState(null, "", window.location.pathname + window.location.search);
      }
    }

    function applyLanguage() {
      document.documentElement.lang = "fr";
      document.documentElement.dir = "ltr";
      document.body.dir = "ltr";
      document.querySelectorAll("[data-ui]").forEach((el) => {
        el.textContent = t(el.dataset.ui);
      });
      document.getElementById("btn-back").setAttribute("aria-label", t("back"));
      document.getElementById("image-modal-close").setAttribute("aria-label", t("closeImage"));
      renderCategoryGrid();
      const currentMenu = window.location.hash.replace(/^#/, "");
      if (currentMenu && menuData[currentMenu]) renderMenu(currentMenu);
    }

    document.getElementById("btn-back").addEventListener("click", closeMenu);
    imageModalClose.addEventListener("click", closeImageModal);
    imageModal.addEventListener("click", (event) => {
      if (event.target === imageModal) closeImageModal();
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && imageModal.classList.contains("is-open")) {
        closeImageModal();
      }
    });

    window.addEventListener("hashchange", () => {
      const h = window.location.hash.replace(/^#/, "");
      if (h && menuData[h]) openMenu(h);
      else closeMenu();
    });

    applyLanguage();

    const initial = window.location.hash.replace(/^#/, "");
    if (initial && menuData[initial]) {
      openMenu(initial);
    }
  </script>
